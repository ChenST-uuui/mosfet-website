<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 沐非特科技</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 50px;
            max-width: 400px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo img {
            height: 60px;
            width: auto;
            margin-bottom: 20px;
        }

        .logo h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .links {
            text-align: center;
            margin-top: 25px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
        }

        .message.success {
            background: #efe;
            color: #0c0;
            border: 1px solid #cfc;
        }

        .loading {
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .loading::after {
            content: '登录中...';
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🔐 登录</h1>
            <p>欢迎回到沐非特科技管理后台</p>
        </div>

        <div id="message" class="message"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" required placeholder="请输入邮箱">
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" required placeholder="请输入密码">
            </div>

            <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
        </form>

        <div class="links">
            <a href="register.html">注册新账号</a>
            <a href="mufet_products.html">返回首页</a>
        </div>

        <div class="loading" id="loading"></div>
    </div>

    <script type="module">
        // Import Firebase SDK
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyCMUnF-am30oqrFi8cyPo8Sc2GCKoj3ZEQ",
            authDomain: "mosfet-97394.firebaseapp.com",
            databaseURL: "https://mosfet-97394-default-rtdb.firebaseio.com",
            projectId: "mosfet-97394",
            storageBucket: "mosfet-97394.firebasestorage.app",
            messagingSenderId: "475401589656",
            appId: "1:475401589656:web:07dd61a25cba332c6711ed",
            measurementId: "G-BRQ9H2913R"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 检查是否已登录
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 已登录，跳转到管理后台
                window.location.href = 'admin.html';
            }
        });

        // 登录表单处理
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
        const loadingDiv = document.getElementById('loading');

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // 检查配置
            if (firebaseConfig.apiKey === "YOUR_API_KEY") {
                showMessage('请先配置 Firebase！查看 firebase-config.js 文件', 'error');
                return;
            }

            // 显示加载状态
            loginBtn.disabled = true;
            loadingDiv.style.display = 'block';

            try {
                // 尝试登录
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                console.log('登录成功:', userCredential.user);
                showMessage('登录成功！正在跳转...', 'success');
                
                // 延迟跳转，让用户看到成功提示
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
                
            } catch (error) {
                console.error('登录失败:', error);
                
                let errorMessage = '登录失败，请检查邮箱和密码';
                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMessage = '邮箱格式不正确';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = '该邮箱未注册';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = '密码错误';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = '尝试次数过多，请稍后再试';
                        break;
                }
                
                showMessage(errorMessage, 'error');
            } finally {
                loginBtn.disabled = false;
                loadingDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
